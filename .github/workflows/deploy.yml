name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'output/compare-feed/**'
      - 'output/thumbs/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci || npm install

      - name: Resolve articles symlink to real copy
        run: |
          rm -f web/public/articles
          cp -r output/compare-feed web/public/articles
          ls web/public/articles | head

      - name: Copy V5.1.8 Imagen thumbs into public folder
        run: |
          rm -rf web/public/thumbs
          if [ -d output/thumbs ]; then
            cp -r output/thumbs web/public/thumbs
            echo "Copied $(ls web/public/thumbs 2>/dev/null | wc -l) thumbs"
          else
            mkdir -p web/public/thumbs
            echo "No output/thumbs/ directory — no images to copy"
          fi

      - name: Build Vite production
        working-directory: web
        env:
          VITE_DEPLOY: '1'
          VITE_FEEDBACK_WORKER_URL: ${{ secrets.VITE_FEEDBACK_WORKER_URL }}
        run: npm run build

      - name: SPA 404 fallback for deep-link routes
        run: cp web/dist/index.html web/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
