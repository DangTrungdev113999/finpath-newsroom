# Format Registry V1.5-lite — source of truth for Master article formats.
# Story Editor + Format Director read this; Master applies per-format pattern.
# V1.5-lite (2026-05-13 PM): Revert V1.3 -20% length squeeze to V5.0 ranges.
#   Reason: -20% caused Pattern E phrasing kỳ quặc (tail fragments + verb
#   cưỡng ép). V5.0 gives AI room flow tự nhiên.
formats:
  flash_qa:
    length_range: [100, 150]   # V1.5-lite revert from [80, 120]
    length_target: 130          # V1.5-lite revert from 100
    structure: paragraph_only
    bullets_count: [0, 0]
    bullet_min_length: 0
    bold_density_min:
      mode: absolute
      value: 3
    tags: [factual, short]
    trigger_categories: []

  standard_qa:
    length_range: [200, 300]   # V1.5-lite revert from [180, 240]
    length_target: 250          # V1.5-lite revert from 210
    structure: opening_bullets_closing
    opening_min: 30
    opening_max: 80
    bullets_count: [3, 6]
    bullet_min_length: 20
    bold_density_min:
      mode: ratio
      value: 0.04
    tags: [insight, paradox]
    trigger_categories: [paradox, why_now, hidden_mechanism]

  standard_listicle:
    length_range: [250, 350]   # V1.5-lite revert from [220, 280]
    length_target: 300          # V1.5-lite revert from 250
    structure: short_opening_dense_bullets
    opening_min: 0
    opening_max: 30
    bullets_count: [4, 7]
    bullet_min_length: 25
    bold_density_min:
      mode: ratio
      value: 0.05
    tags: [comparison, signals]
    trigger_categories: [comparison_deep, early_signal]

  standard_narrative:
    length_range: [250, 350]   # V1.5-lite revert from [220, 280]
    length_target: 300          # V1.5-lite revert from 250
    structure: flow_paragraphs
    opening_min: 40
    bullets_count: [0, 2]
    bullet_min_length: 20
    bold_density_min:
      mode: ratio
      value: 0.03
    tags: [mechanism, time_flow]
    trigger_categories: [hidden_mechanism]
    tie_break_signal: narrative_timeline_markers
