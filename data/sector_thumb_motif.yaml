# V5.1.8 sector → drama motif mapping for Imagen 4 thumb prompts.
# Used by lib/stages/run_image_gen.py to translate Master article's sector
# into a visual anchor that gives the thumb sector-specific tone without
# leaking text/logos.
#
# Each motif is 1 line of English description (Imagen 4 prompts in English
# produce stronger drama than Vietnamese — model trained mostly on EN data).
# Lines are concatenated INTO a larger prompt template by run_image_gen.py.
#
# Add new sector → add new key. Missing sector falls back to `default`.

