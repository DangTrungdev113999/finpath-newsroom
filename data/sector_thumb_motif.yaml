logistics: "Container port at night with stacked containers, drone aerial wide shot, moody blue"
fb: "Vietnamese factory floor with stainless steel tanks + assembly line, dramatic side-lit"
apparel: "Garment factory bay with sewing machines under hard industrial lights, depth of field"
retail: "Empty modern Vietnamese mall corridor at closing time, dim track lighting"
seafood: "Vietnamese fishing fleet at dawn pulling nets, cold dramatic blue light"
defensive: "Server data center corridor with rows of dark racks + cool blue glow, cinematic"
default: "Vietnamese cityscape at twilight, contrast-rich cinematic lighting, dramatic"
