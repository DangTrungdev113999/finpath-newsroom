- title: "Thông tư 121/2020/TT-BTC"
  effective_date: 2021-02-15
  affected_topics: ["Tỷ lệ an toàn vốn khả dụng", "Cho vay ký quỹ", "Giới hạn nợ"]
  summary: "Quy định hoạt động của công ty chứng khoán: tổng dư nợ cho vay ký quỹ không vượt 200% vốn chủ sở hữu; tổng nợ phải trả không vượt 5 lần vốn chủ sở hữu. Khi tỷ lệ vốn khả dụng giảm dưới 120%, công ty phải báo cáo hàng ngày cho Ủy ban Chứng khoán Nhà nước. Thay thế Thông tư 210/2012/TT-BTC."
  url: "https://thuvienphapluat.vn/van-ban/Doanh-nghiep/Thong-tu-121-2020-TT-BTC-huong-dan-hoat-dong-cua-cong-ty-chung-khoan-453690.aspx"

- title: "Thông tư 96/2020/TT-BTC"
  effective_date: 2021-01-01
  affected_topics: ["Công bố thông tin", "Báo cáo định kỳ", "Báo cáo bất thường"]
  summary: "Hướng dẫn công bố thông tin trên thị trường chứng khoán áp dụng cho công ty chứng khoán, công ty quản lý quỹ, công ty đại chúng, tổ chức phát hành trái phiếu ra công chúng và chào bán cổ phần lần đầu. Mở rộng phạm vi đối tượng phải công bố thông tin so với Thông tư 155/2015/TT-BTC (thay thế). Quy định rõ thời hạn và nội dung thông tin định kỳ lẫn bất thường bắt buộc."
  url: "https://thuvienphapluat.vn/van-ban/Chung-khoan/Thong-tu-96-2020-TT-BTC-quy-dinh-cong-bo-thong-tin-tren-thi-truong-chung-khoan-459000.aspx"

- title: "Nghị định 65/2022/NĐ-CP"
  effective_date: 2022-09-16
  affected_topics: ["Phát hành trái phiếu doanh nghiệp", "Xếp hạng tín nhiệm", "Nhà đầu tư chuyên nghiệp", "Doanh thu IB công ty chứng khoán"]
  summary: "Sửa đổi Nghị định 153/2020/NĐ-CP về chào bán, giao dịch trái phiếu doanh nghiệp riêng lẻ. Tăng mệnh giá tối thiểu từ 100.000 đồng lên 100 triệu đồng; siết điều kiện nhà đầu tư cá nhân chuyên nghiệp mua trái phiếu; bổ sung yêu cầu xếp hạng tín nhiệm cho một số lô phát hành; bắt buộc bổ nhiệm đại lý quản lý tài sản bảo đảm. Tác động trực tiếp làm giảm nguồn thu tư vấn phát hành (IB) của công ty chứng khoán."
  url: "https://thuvienphapluat.vn/van-ban/Doanh-nghiep/Nghi-dinh-65-2022-ND-CP-sua-doi-Nghi-dinh-153-2020-ND-CP-chao-ban-giao-dich-trai-phieu-doanh-nghiep-529835.aspx"

- title: "Nghị định 08/2023/NĐ-CP"
  effective_date: 2023-03-05
  affected_topics: ["Cơ cấu nợ trái phiếu", "Gia hạn trái phiếu", "Hoãn xếp hạng tín nhiệm"]
  summary: "Sửa đổi và tạm ngưng một số điều của Nghị định 65/2022/NĐ-CP đến hết ngày 31/12/2023: cho phép doanh nghiệp phát hành thương lượng gia hạn trái phiếu tối đa 2 năm và thanh toán gốc/lãi bằng tài sản khác; tạm ngưng yêu cầu xếp hạng tín nhiệm bắt buộc và giới hạn nhà đầu tư cá nhân. Biện pháp tháo gỡ khẩn cấp thị trường trái phiếu doanh nghiệp giai đoạn khủng hoảng thanh khoản 2022-2023."
  url: "https://thuvienphapluat.vn/van-ban/Chung-khoan/Nghi-dinh-08-2023-ND-CP-sua-doi-Nghi-dinh-chao-ban-giao-dich-trai-phieu-doanh-nghiep-rieng-le-557520.aspx"

- title: "Quyết định 87/QĐ-UBCK"
  effective_date: 2017-04-01
  affected_topics: ["Giao dịch ký quỹ", "Tỷ lệ cho vay", "Giám sát ký quỹ"]
  summary: "Quy chế hướng dẫn giao dịch ký quỹ chứng khoán do Ủy ban Chứng khoán Nhà nước ban hành ngày 25/01/2017. Quy định tỷ lệ ký quỹ ban đầu tối thiểu 50%, tỷ lệ duy trì tối thiểu 30%; hạn mức cho vay ký quỹ của công ty chứng khoán không vượt 200% vốn chủ sở hữu; cho vay một mã tối đa 10% vốn chủ sở hữu; cho vay một khách hàng tối đa 3% vốn chủ sở hữu. Là văn bản tiền thân cho quy định tài chính tại Thông tư 121/2020/TT-BTC."
  url: "https://thuvienphapluat.vn/van-ban/Chung-khoan/Quyet-dinh-87-QD-UBCK-huong-dan-giao-dich-ky-quy-chung-khoan-2017-338440.aspx"

- title: "Nghị định 155/2020/NĐ-CP"
  effective_date: 2021-01-01
  affected_topics: ["Chứng khoán và thị trường chứng khoán", "Hoạt động kinh doanh chứng khoán", "Điều kiện thành lập CTCK"]
  summary: "Nghị định hướng dẫn Luật Chứng khoán 2019 — khung pháp lý toàn diện cho hoạt động thị trường: điều kiện thành lập và cấp phép công ty chứng khoán, quy định về chào bán cổ phiếu và trái phiếu ra công chúng, nghĩa vụ công bố thông tin, chế tài xử lý vi phạm. Thay thế Nghị định 58/2012/NĐ-CP và Nghị định 60/2015/NĐ-CP."
  url: "https://thuvienphapluat.vn/van-ban/Chung-khoan/Nghi-dinh-155-2020-ND-CP-huong-dan-Luat-Chung-khoan-453956.aspx"

- title: "Thông tư 122/2020/TT-BTC"
  effective_date: 2021-01-01
  affected_topics: ["Phát hành trái phiếu doanh nghiệp", "Công bố thông tin TPDN", "Báo cáo định kỳ trái phiếu"]
  summary: "Hướng dẫn công bố thông tin và báo cáo về chào bán, giao dịch trái phiếu doanh nghiệp riêng lẻ tại thị trường trong nước và trái phiếu doanh nghiệp ra thị trường quốc tế (hướng dẫn thi hành Nghị định 153/2020/NĐ-CP). Quy định nội dung, thời hạn và phương thức công bố thông tin bắt buộc cho tổ chức phát hành, đại lý phân phối và công ty chứng khoán tư vấn phát hành."
  url: "https://thuvienphapluat.vn/van-ban/Chung-khoan/Thong-tu-122-2020-TT-BTC-chao-ban-giao-dich-trai-phieu-doanh-nghiep-rieng-le-454045.aspx"
